{# expects: faq_items = [{'q': ..., 'a': ...}, ...], faq_id = 'page-faq' #}
{% if faq_items and faq_items|length %}
<div class="tool-faq-wrap mb-3">
<section class="tool-faq card-soft p-4" aria-labelledby="{{ faq_id }}">
  <h2 id="{{ faq_id }}" class="tool-faq__title page-section-title">{{ tr('Частые вопросы', 'FAQ') }}</h2>
  <div class="accordion tool-faq__accordion" id="{{ faq_id }}-acc">
    {% for item in faq_items %}
    <div class="accordion-item tool-faq__item">
      <h3 class="accordion-header">
        <button class="accordion-button tool-faq__btn collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#{{ faq_id }}-{{ loop.index }}"
                aria-expanded="false"
                aria-controls="{{ faq_id }}-{{ loop.index }}">
          {{ item.q }}
        </button>
      </h3>
      <div id="{{ faq_id }}-{{ loop.index }}"
           class="accordion-collapse collapse"
           data-bs-parent="#{{ faq_id }}-acc">
        <div class="accordion-body tool-faq__body">{{ item.a }}</div>
      </div>
    </div>
    {% endfor %}
  </div>
</section>
</div>
{% endif %}
