<!doctype html>
<html lang="{{ get_locale() }}" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}DomainTools (Python){% endblock %}</title>
  <meta name="description" content="DNS / WHOIS / GeoIP утилиты с историей запросов (python.domaintools.site)">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

  <!-- Open Graph -->
  <meta property="og:title" content="DomainTools (Python)">
  <meta property="og:description" content="DNS / WHOIS / GeoIP утилиты с историей запросов">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="{{ url_for('static', filename='og.png', _external=True) }}">

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">DomainTools (Python)</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topnav" aria-controls="topnav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="topnav" class="collapse navbar-collapse">
      <div class="ms-auto d-flex align-items-center gap-2">
        <a class="btn btn-sm btn-outline-light" href="/dns">DNS</a>
        <a class="btn btn-sm btn-outline-light" href="/whois">WHOIS</a>
        <a class="btn btn-sm btn-outline-light" href="/geo">GeoIP</a>
        <a class="btn btn-sm btn-outline-warning" href="/history">History</a>
        <button class="btn btn-sm btn-secondary" type="button" title="Тёмная/светлая тема" data-theme-toggle>🌓</button>
      </div>
    </div>
  </div>
</nav>

<main class="container">
  {% block content %}{% endblock %}

  <div class="footer">
    <hr>
    <div class="d-flex justify-content-between align-items-center">
      <span>© {{ 2025 }} DomainTools (Python)</span>
      <span>
        <a href="/sitemap.xml">sitemap.xml</a> ·
        <a href="/robots.txt">robots.txt</a>
      </span>
    </div>
  </div>
</main>

<!-- JS -->
<script src="{{ url_for('static', filename='app.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
