<!doctype html>
<html lang="{{ get_locale() }}" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}DomainTools{% endblock %}</title>
  <meta name="description" content="DNS / WHOIS / GeoIP утилиты с историей запросов (Domaintools.site)">

  <!-- Favicon pack -->
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="DomainTools">
  <meta property="og:description" content="DNS / WHOIS / GeoIP утилиты с историей запросов">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="{{ url_for('static', filename='og.png', _external=True) }}">

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">

  <!-- Yandex Ads bootstrap -->
  <script>window.yaContextCb = window.yaContextCb || [];</script>
  <script async src="https://yandex.ru/ads/system/context.js"></script>

  <!-- Раннее применение сохранённой темы -->
  <script>
  (function () {
    try {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') {
        document.documentElement.setAttribute('data-bs-theme', saved);
      }
    } catch (e) {}
  })();
  </script>

  <!-- JSON-LD: Organization + Website + SiteSearch -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "DomainTools",
    "url": "https://domaintools.site/",
    "logo": "{{ url_for('static', filename='og.png', _external=True) }}"
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "DomainTools",
    "url": "https://domaintools.site/",
    "potentialAction": [{
      "@type": "SearchAction",
      "target": "https://domaintools.site/whois?query={query}",
      "query-input": "required name=query"
    },{
      "@type": "SearchAction",
      "target": "https://domaintools.site/dns?q={q}",
      "query-input": "required name=q"
    },{
      "@type": "SearchAction",
      "target": "https://domaintools.site/domains?query={query}",
      "query-input": "required name=query"
    }]
  }
  </script>
  {% block jsonld_extra %}{% endblock %}
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">DomainTools</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topnav"
            aria-controls="topnav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="topnav" class="collapse navbar-collapse">
      <!-- Мобилка -->
      <div class="d-lg-none w-100">
        <div class="nav-scroller d-flex gap-2 py-2 px-1">
          <a class="btn btn-sm btn-outline-light flex-shrink-0" href="/dns">DNS</a>
          <a class="btn btn-sm btn-outline-light flex-shrink-0" href="/domains">Domains</a>
          <a class="btn btn-sm btn-outline-light flex-shrink-0" href="/whois">WHOIS</a>
          <a class="btn btn-sm btn-outline-light flex-shrink-0" href="/geo">GeoIP</a>
          <a class="btn btn-sm btn-outline-warning flex-shrink-0" href="/history">History</a>
        </div>
        <div class="py-2 text-center">
          <a class="btn btn-sm btn-outline-light" href="#" data-theme-toggle>🌓 Тема</a>
        </div>
      </div>

      <!-- Десктоп -->
      <div class="ms-auto d-none d-lg-flex align-items-center gap-2">
        <a class="btn btn-sm btn-outline-light" href="/dns">DNS</a>
        <a class="btn btn-sm btn-outline-light" href="/domains">Domains</a>
        <a class="btn btn-sm btn-outline-light" href="/whois">WHOIS</a>
        <a class="btn btn-sm btn-outline-light" href="/geo">GeoIP</a>
        <a class="btn btn-sm btn-outline-warning" href="/history">History</a>
        <button class="btn btn-sm btn-outline-light d-none d-lg-inline-flex align-items-center gap-1"
                type="button" title="Тёмная/светлая тема" data-theme-toggle>🌓</button>
      </div>
    </div>
  </div>
</nav>

<main class="container">
  {% block content %}{% endblock %}
</main>

<!-- Скрипты -->
<script src="{{ url_for('static', filename='app.js') }}?v=4" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

{% block before_footer %}{% include "_ad_rsy.html" %}{% endblock %}
{% include "_footer.html" %}

<!-- Переключатель темы -->
<script>
(function () {
  const root = document.documentElement;
  function setTheme(mode) { root.setAttribute('data-bs-theme', mode); try { localStorage.setItem('theme', mode); } catch (e) {} }
  function currentTheme() { return root.getAttribute('data-bs-theme') === 'dark' ? 'dark' : 'light'; }
  try { const saved = localStorage.getItem('theme'); if (saved === 'dark' || saved === 'light') setTheme(saved); } catch (e) {}
  document.addEventListener('click', function (e) {
    const t = e.target.closest('[data-theme-toggle]'); if (!t) return;
    e.preventDefault(); setTheme(currentTheme() === 'dark' ? 'light' : 'dark');
    const nav = document.getElementById('topnav');
    if (nav && nav.classList.contains('show') && window.bootstrap?.Collapse) {
      new bootstrap.Collapse(nav, { toggle: false }).hide();
    }
  });
})();
</script>

<!-- Доп. RTB форматы -->
<script>
window.yaContextCb.push(() => {
  Ya.Context.AdvManager.render({ blockId: "R-A-2086160-4", type: "fullscreen", platform: "touch" });
});
window.yaContextCb.push(() => {
  Ya.Context.AdvManager.render({ blockId: "R-A-2086160-5", type: "floorAd", platform: "touch" });
});
</script>
</body>
</html>
