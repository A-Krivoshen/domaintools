<!doctype html>
<html lang="{{ get_locale() }}" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}DomainTools{% endblock %}</title>
  <meta name="description" content="DNS / WHOIS / GeoIP утилиты с историей запросов (Domaintools.site)">

  <!-- Favicon pack -->
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="https://domaintools.site/static/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="DomainTools">
  <meta property="og:description" content="DNS / WHOIS / GeoIP утилиты с историей запросов">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="{{ url_for('static', filename='og.png', _external=True) }}">

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">

  <!-- Yandex Ads bootstrap -->
  <script>window.yaContextCb = window.yaContextCb || [];</script>
  <script async src="https://yandex.ru/ads/system/context.js"></script>

  <!-- Раннее применение сохранённой темы -->
  <script>
  (function () {
    try {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') {
        document.documentElement.setAttribute('data-bs-theme', saved);
      }
    } catch (e) {}
  })();
  </script>

  <!-- JSON-LD: Organization + Website + SiteSearch -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "DomainTools",
    "url": "https://domaintools.site/",
    "logo": "{{ url_for('static', filename='og.png', _external=True) }}"
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "DomainTools",
    "url": "https://domaintools.site/",
    "potentialAction": [{
      "@type": "SearchAction",
      "target": "https://domaintools.site/whois?query={query}",
      "query-input": "required name=query"
    },{
      "@type": "SearchAction",
      "target": "https://domaintools.site/dns?q={q}",
      "query-input": "required name=q"
    },{
      "@type": "SearchAction",
      "target": "https://domaintools.site/domains?query={query}",
      "query-input": "required name=query"
    }]
  }
  </script>
  {% block jsonld_extra %}{% endblock %}
</head>

<body class="bg-light">

<!-- ===== NAVBAR (единый для десктопа и мобилки через collapse) ===== -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg mb-3 sticky-top">
  <div class="container">

    <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">DomainTools</a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">

      <!-- Левые пункты -->
      <ul class="navbar-nav me-auto my-2 my-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='dns_lookup' %}active{% endif %}"
             href="{{ url_for('dns_lookup') }}">DNS</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='domain_search' %}active{% endif %}"
             href="{{ url_for('domain_search') }}">Domains</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='whois_lookup' %}active{% endif %}"
             href="{{ url_for('whois_lookup') }}">WHOIS</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='geo_lookup' %}active{% endif %}"
             href="{{ url_for('geo_lookup') }}">GeoIP</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.blueprint=='site_checker' %}active{% endif %}"
             href="{{ url_for('site_checker.site_checker') }}">Site Checker</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='history_list' %}active{% endif %}"
             href="{{ url_for('history_list') }}">History</a>
        </li>
      </ul>

      <!-- Правый блок -->
      <div class="d-flex">
        <button class="btn btn-sm btn-outline-light ms-lg-2" type="button" data-theme-toggle>Тема</button>
      </div>
    </div>
  </div>
</nav>

<main class="container">
  {% block content %}{% endblock %}
</main>

<!-- Скрипты (bootstrap первым, затем наш app.js) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="{{ url_for('static', filename='app.js') }}?v=5" defer></script>

{% block before_footer %}{% include "_ad_rsy.html" %}{% endblock %}
{% include "_footer.html" %}

<!-- Доп. RTB форматы -->
<script>
window.yaContextCb.push(() => {
  Ya.Context.AdvManager.render({ blockId: "R-A-2086160-4", type: "fullscreen", platform: "touch" });
});
window.yaContextCb.push(() => {
  Ya.Context.AdvManager.render({ blockId: "R-A-2086160-5", type: "floorAd", platform: "touch" });
});
</script>
</body>
</html>
