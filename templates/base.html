<!doctype html>
<html lang="{{ get_locale() }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}python.domaintools.site{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">DomainTools (Python)</a>
    <div>
      <a class="btn btn-sm btn-outline-light me-2" href="/dns">DNS</a>
      <a class="btn btn-sm btn-outline-light me-2" href="/whois">WHOIS</a>
      <a class="btn btn-sm btn-outline-light" href="/geo">GeoIP</a>
    </div>
  </div>
</nav>
<main class="container">
  {% block content %}{% endblock %}
</main>
</body>
</html>
