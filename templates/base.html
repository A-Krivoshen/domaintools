<script>
(function () {
  try {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') {
      document.documentElement.setAttribute('data-bs-theme', saved);
    }
  } catch (e) {}
})();
</script>

      <a class="btn btn-sm btn-outline-light flex-shrink-0" href="/geo">GeoIP</a>

    </div>
    <div class="py-2 text-center">
      <a class="btn btn-sm btn-outline-light" href="#" data-theme-toggle>🌓 Тема</a>
    </div>
  </div>

  <!-- Десктоп: как было -->
  <div class="ms-auto d-none d-lg-flex align-items-center gap-2">

</div>


    </div>
  </div>

<main class="container">
  {% block content %}{% endblock %}
</main>

<!-- JS -->
<script src="{{ url_for('static', filename='app.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
<script>
  // копирование значений в буфер
  document.addEventListener('click', function (e) {
    if (!e.target.classList.contains('copy-btn')) return;
    const row = e.target.closest('tr');
    const code = row && row.querySelector('.dns-value');
    if (!code) return;
    const txt = code.textContent.trim();
    navigator.clipboard.writeText(txt).then(() => {
      const prev = e.target.textContent;
      e.target.textContent = '✓';
      setTimeout(() => e.target.textContent = prev, 800);
    }).catch(() => {
      alert('Copy failed');
    });
  });
</script>
{% block before_footer %}{% include "_ad_rsy.html" %}{% endblock %}
{% include "_footer.html" %}
<script>
(function () {
  const root = document.documentElement;

  function setTheme(mode) {
    root.setAttribute('data-bs-theme', mode);
    try { localStorage.setItem('theme', mode); } catch (e) {}
  }
  function currentTheme() {
    return root.getAttribute('data-bs-theme') === 'dark' ? 'dark' : 'light';
  }

  // Если в localStorage уже есть тема — применим (на случай когда head-скрипт не сработал)
  try {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') setTheme(saved);
  } catch (e) {}

  // Делегирование клика по любому элементу с атрибутом [data-theme-toggle]
  document.addEventListener('click', function (e) {
    const t = e.target.closest('[data-theme-toggle]');
    if (!t) return;
    e.preventDefault();
    setTheme(currentTheme() === 'dark' ? 'light' : 'dark');

    // После переключения на мобилке сворачиваем меню
    const nav = document.getElementById('topnav');
    if (nav && nav.classList.contains('show') && window.bootstrap?.Collapse) {
      new bootstrap.Collapse(nav, { toggle: false }).hide();
    }
  });
})();
</script>

</body>
</html>
