<script type="application/ld+json">
{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[
{% if breadcrumb_items is defined and breadcrumb_items %}
{% for item in breadcrumb_items %}{"@type":"ListItem","position":{{ loop.index }},"name":{{ item.name|tojson }},"item":"{{ site_root }}{{ item.path }}"}{% if not loop.last %},{% endif %}
{% endfor %}
{% else %}
{"@type":"ListItem","position":1,"name":{{ tr('Главная','Home')|tojson }},"item":"{{ site_root }}/"},
{"@type":"ListItem","position":2,"name":{{ breadcrumb_name|tojson }},"item":"{{ site_root }}{{ breadcrumb_path }}"}
{% endif %}
]}
</script>
