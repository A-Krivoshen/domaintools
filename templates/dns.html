{% extends 'base.html' %}
{% block title %}DNS Lookup{% endblock %}
{% block content %}
<div class="bg-white p-4 rounded-3 shadow-sm">
  <form method="post" class="row g-3">
    <div class="col-auto">
      <input name="domain" class="form-control" placeholder="example.com" required>
    </div>
    <div class="col-auto">
      <button class="btn btn-primary">Lookup</button>
    </div>
  </form>
  {% if error %}<div class="alert alert-danger mt-3">{{ error }}</div>{% endif %}
  {% if result %}
  <hr>
  <h5>Результат</h5>
  {% for qtype, rows in result.items() %}
    <h6 class="mt-3">{{ qtype }}</h6>
    <pre class="mb-0">{{ rows | tojson }}</pre>
  {% endfor %}
  {% endif %}
</div>
{% endblock %}
