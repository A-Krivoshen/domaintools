<!DOCTYPE html>
<html lang="en">
<head>
    <title>DNS Lookup</title>
    <style> /* Стили как в index.html */ </style>
</head>
<body>
    <h1>DNS Lookup</h1>
    <form method="POST">
        <input name="domain" placeholder="Enter domain">
        <button>Lookup DNS</button>
    </form>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    {% if result %}
        <table border="1">
            <tr><th>Type</th><th>Records</th></tr>
            {% for qtype, records in result.items() %}
                <tr><td>{{ qtype }}</td><td>{{ records | join(', ') }}</td></tr>
            {% endfor %}
        </table>
    {% endif %}
    <a href="{{ url_for('index') }}">Back to Search</a>
</body>
</html>
