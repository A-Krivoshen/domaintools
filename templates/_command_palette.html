<div id="commandPalette"
     class="command-palette"
     role="dialog"
     aria-modal="true"
     aria-labelledby="commandPaletteTitle"
     aria-hidden="true"
     hidden>
  <div class="command-palette__backdrop" data-command-palette-close tabindex="-1"></div>
  <div class="command-palette__panel" role="document">
    <div class="command-palette__header">
      <label class="command-palette__search-wrap" for="commandPaletteInput">
        <i class="fa-solid fa-magnifying-glass command-palette__search-icon" aria-hidden="true"></i>
        <input id="commandPaletteInput"
               class="command-palette__input"
               type="search"
               autocomplete="off"
               spellcheck="false"
               placeholder="{{ tr('Перейти к инструменту…', 'Jump to a tool…') }}"
               aria-controls="commandPaletteList"
               aria-autocomplete="list">
      </label>
      <button type="button" class="command-palette__close btn btn-sm btn-outline-secondary" data-command-palette-close aria-label="{{ tr('Закрыть', 'Close') }}">
        <span class="command-palette__kbd d-none d-sm-inline">Esc</span>
        <i class="fa-solid fa-xmark d-sm-none" aria-hidden="true"></i>
      </button>
    </div>
    <p id="commandPaletteTitle" class="visually-hidden">{{ tr('Быстрый переход', 'Quick navigation') }}</p>
    <ul id="commandPaletteList" class="command-palette__list" role="listbox" aria-label="{{ tr('Инструменты', 'Tools') }}"></ul>
    {% include '_query_history_chips.html' %}
    <div class="command-palette__footer">
      <span><kbd class="command-palette__kbd">↑↓</kbd> {{ tr('выбор', 'navigate') }}</span>
      <span><kbd class="command-palette__kbd">↵</kbd> {{ tr('открыть', 'open') }}</span>
      <span class="d-none d-md-inline command-palette__footer-shortcut">
        <kbd class="command-palette__kbd" data-shortcut-mod>Ctrl</kbd><kbd class="command-palette__kbd">K</kbd>
      </span>
    </div>
  </div>
</div>
