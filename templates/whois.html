{% extends 'base.html' %}
{% block title %}WHOIS{% endblock %}
{% block content %}
<div class="bg-white p-4 rounded-3 shadow-sm">
  <form method="post" class="row g-3">
    <div class="col-auto">
      <input name="query" class="form-control" placeholder="example.com или 8.8.8.8" required>
    </div>
    <div class="col-auto">
      <button class="btn btn-primary">Lookup</button>
    </div>
  </form>
  {% if error %}<div class="alert alert-danger mt-3">{{ error }}</div>{% endif %}
  {% if result %}
  <hr>
  <h5>Результат</h5>
  <pre class="mb-0">{{ result | tojson(indent=2) }}</pre>
  {% endif %}
</div>
{% endblock %}
