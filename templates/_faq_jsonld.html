{% if faq_items and faq_items|length %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in faq_items %}
    {
      "@type": "Question",
      "name": {{ item.q|tojson }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ item.a|striptags|trim|tojson }}
      }
    }{% if not loop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>
{% endif %}
