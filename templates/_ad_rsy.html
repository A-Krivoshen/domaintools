<div class="before-footer-ad container">
  <!-- контейнер под рекомендательный виджет РСЯ -->
  <div id="yandex_rtb_widget" class="w-100" style="min-height:180px"></div>

  <script>
    (function () {
      var blockId  = "{{ yandex_rtb_block_id }}";    // из env: YANDEX_RTB_BLOCK_ID=C-A-2086160-2
      var renderTo = "yandex_rtb_widget";

      // если ID не пришёл — молча выходим
      if (!blockId) { console.warn("RTB: empty blockId"); return; }

      // очередь SDK РСЯ
      window.yaContextCb = window.yaContextCb || [];

      // ленивый вызов: как только SDK готов — рендерим
      window.yaContextCb.push(function () {
        try {
          // C-A-… — рекомендательный виджет
          if (blockId.indexOf("C-A-") === 0 && window.Ya?.Context?.AdvManager?.renderWidget) {
            Ya.Context.AdvManager.renderWidget({ renderTo: renderTo, blockId: blockId });
          }
          // на всякий случай fallback на обычный RTB (R-A-…)
          else if (window.Ya?.Context?.AdvManager?.render) {
            Ya.Context.AdvManager.render({ blockId: blockId, renderTo: renderTo, pageNumber: 1 });
          }
        } catch (e) {
          console.warn("RTB render error:", e);
        }
      });
    })();
  </script>

  <noscript>
    <div class="text-center text-muted small">Рекомендации недоступны — включите JavaScript.</div>
  </noscript>
</div>
