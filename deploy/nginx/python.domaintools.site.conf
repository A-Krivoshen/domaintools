server {
    listen 80;
    listen [::]:80;
    server_name python.domaintools.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name python.domaintools.site;

    # Поставь свои действующие пути сертификатов
    ssl_certificate     /etc/letsencrypt/live/python.domaintools.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/python.domaintools.site/privkey.pem;

    access_log /var/log/nginx/python.domaintools.site.access.log rt_cache;
    error_log  /var/log/nginx/python.domaintools.site.error.log;

    # health для мониторинга
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # основное приложение
    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # статика, если когда-нибудь понадобится отдавать напрямую
    # location /static/ {
    #     alias /var/www/python.domaintools.site/htdocs/static/;
    #     access_log off;
    #     expires 30d;
    # }
}
