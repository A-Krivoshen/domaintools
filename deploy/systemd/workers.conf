# Copy to /etc/systemd/system/python-domaintools.service.d/workers.conf
# systemctl daemon-reload && systemctl restart python-domaintools.service

[Service]
ExecStart=
ExecStart=/var/www/python.domaintools.site/htdocs/.venv/bin/gunicorn \
  --workers 6 \
  --bind 127.0.0.1:8001 \
  --timeout 120 \
  --graceful-timeout 30 \
  --max-requests 500 \
  --max-requests-jitter 50 \
  wsgi:app